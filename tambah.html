<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tambah Data</title>

<style>

body{
    font-family:Arial,Helvetica,sans-serif;
    background:#f4f6f9;
}

.container{
    max-width:700px;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
}

h2{
    margin-bottom:20px;
    color:#7FB77E;
}

.form-group{
    margin-bottom:18px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
}

input,
textarea,
select{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    box-sizing:border-box;
}

textarea{
    resize:vertical;
    height:100px;
}

.button-group{
    display:flex;
    gap:10px;
    margin-top:20px;
}

button{
    padding:12px 20px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

.simpan{
    background:#7FB77E;
    color:white;
}

.kembali{
    background:#999;
    color:white;
}

button:hover{
    opacity:.9;
}

</style>

</head>

<body>

<div class="container">

<h2>Tambah Data Kuliner</h2>

<div class="form-group">
<label>Nama</label>
<input type="text" id="nama">
</div>

<div class="form-group">
<label>Harga</label>
<input type="text" id="harga">
</div>

<div class="form-group">
<label>Kategori</label>
<select id="kategori">
    <option value="Viral">Viral</option>
    <option value="Rekomendasi">Rekomendasi</option>
</select>
</div>

<div class="form-group">
<label>Jenis</label>
<select id="jenis">
    <option value="makanan">Makanan</option>
    <option value="minuman">Minuman</option>
    <option value="jajanan">Jajanan</option>
    <option value="oleh-oleh">Oleh-Oleh</option>
</select>
</div>

<div class="form-group">
<label>Lokasi</label>
<input type="text" id="lokasi">
</div>

<div class="form-group">
<label>Deskripsi</label>
<textarea id="deskripsi"></textarea>
</div>

<div class="form-group">
<label>Upload Gambar</label>
<input
type="file"
id="gambar"
accept="image/*">
</div>

<div class="button-group">

<button
class="simpan"
onclick="simpanData()">

Simpan

</button>

<button
class="kembali"
onclick="location.href='admin.html'">

Kembali

</button>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<script>

if(!sessionStorage.getItem("login")){
    location.href="admin-login.html";
}
    function readFileAsBase64(file){

    return new Promise((resolve,reject)=>{

        const reader = new FileReader();

        reader.onload = () => resolve(reader.result);

        reader.onerror = error => reject(error);

        reader.readAsDataURL(file);

    });

}

async function simpanData(){

    const nama = document.getElementById("nama").value.trim();
    const harga = document.getElementById("harga").value.trim();
    const kategori = document.getElementById("kategori").value;
    const jenis = document.getElementById("jenis").value;
    const lokasi = document.getElementById("lokasi").value.trim();
    const deskripsi = document.getElementById("deskripsi").value.trim();
    const file = document.getElementById("gambar").files[0];

if(!file){
    alert("Silakan pilih gambar.");
    return;
}

const gambar = await readFileAsBase64(file);

    if(
        nama=="" ||
        harga=="" ||
        lokasi=="" ||
        deskripsi==""
    ){
        alert("Semua data wajib diisi.");
        return;
    }

    const { error } = await db
    .from("kuliner")
    .insert([
    {
        id: crypto.randomUUID(),
        nama,
        harga,
        kategori,
        jenis,
        lokasi,
        deskripsi,
        gambar
}
]);

    if(error){
        console.log(error);
        alert("Gagal menyimpan data\n\n"+error.message);
        return;
    }

    alert("Data berhasil ditambahkan");

    location.href="admin.html";

}

</script>

</body>
</html>
