<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Kuliner</title>
    
    <!-- Link Manifest PWA -->
    <link rel="manifest" href="./manifest.json">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="navbar">
    <h2>Detail Kuliner Khas Bogor</h2>
    <nav>
        <a href="index.html">Home</a>
    </nav>
</header>

<main class="detail-container">

    <img id="gambar" src="assets/no-image.png" alt="Loading gambar..." class="detail-img" loading="lazy" onerror="this.onerror=null; this.src='assets/no-image.png';">

    <h1 id="nama">Memuat...</h1>

    <table class="detail-table">
        <tr>
            <td><b>Kategori</b></td>
            <td id="kategori">-</td>
        </tr>
        <tr>
            <td><b>Harga</b></td>
            <td id="harga">-</td>
        </tr>
        <tr>
            <td><b>Lokasi</b></td>
            <td id="lokasi">-</td>
        </tr>
    </table>

    <h3>Deskripsi</h3>

    <p id="deskripsi">Memuat deskripsi...</p>

    <br>

    <a href="index.html" class="btn-detail">← Kembali ke Home</a>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<script>
async function loadDetail() {
    // Ambil parameter ID dari URL
    const id = new URLSearchParams(window.location.search).get("id");

    if (!id) {
        alert("ID Kuliner tidak valid!");
        window.location.href = "index.html";
        return;
    }

    try {
        const { data, error } = await db
            .from("kuliner")
            .select("*")
            .eq("id", id)
            .single();

        if (error || !data) {
            console.error("Error mengambil data detail:", error);
            alert("Data tidak ditemukan atau jaringan offline!");
            window.location.href = "index.html";
            return;
        }

        // Tampilkan Data ke HTML
        const imgElement = document.getElementById("gambar");
        imgElement.src = data.gambar || "assets/no-image.png";
        imgElement.alt = data.nama || "Detail Kuliner";

        document.getElementById("nama").textContent = data.nama || "-";
        document.getElementById("kategori").textContent = data.kategori || "-";
        document.getElementById("harga").textContent = data.harga || "-";
        document.getElementById("lokasi").textContent = data.lokasi || "-";
        document.getElementById("deskripsi").textContent = data.deskripsi || "Tidak ada deskripsi.";

    } catch (err) {
        console.error("Gagal memuat detail:", err);
    }
}

document.addEventListener("DOMContentLoaded", loadDetail);

// Pendaftaran Service Worker untuk PWA Offline
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
            .then((reg) => console.log('Service Worker berhasil terdaftar:', reg.scope))
            .catch((err) => console.error('Pendaftaran Service Worker gagal:', err));
    });
}
</script>

</body>
</html>
