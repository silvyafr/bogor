<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Kuliner - Kuliner Bogor</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>

    <header>
        <h1>Detail Kuliner</h1>
    </header>

    <main>
        <div id="detailContainer" class="container"></div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <script src="database.js"></script>

    <script>
        async function muatDetail() {
            const container = document.getElementById("detailContainer");
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');

            if (!id) {
                container.innerHTML = "<p>ID tidak ditemukan.</p>";
                return;
            }

            // 1. Coba ambil dari Supabase jika Online
            if (navigator.onLine) {
                try {
                    const { data, error } = await db.from("kuliner").select("*").eq("id", id).single();
                    if (error) throw error;
                    renderDetail(data);
                    return;
                } catch (e) {
                    console.log("Gagal mengambil data online, mencoba dari cache IndexedDB...");
                }
            }

            // 2. Fallback Offline dari IndexedDB (Tanpa mengubah susunan HTML/CSS)
            ambilDariIndexedDB((dataLokal) => {
                const item = dataLokal.find(i => String(i.id) === String(id));
                if (item) {
                    renderDetail(item);
                } else {
                    container.innerHTML = "<p>Data tidak ditemukan secara offline.</p>";
                }
            });
        }

        // Render menggunakan kelas dasar tanpa pembungkus ekstra agar tidak merusak layout menyamping
        function renderDetail(item) {
            const container = document.getElementById("detailContainer");
            const gambarSrc = item.gambar || 'assets/no-image.png';

            container.innerHTML = `
                <img src="${gambarSrc}" alt="${item.nama}" onerror="this.onerror=null; this.src='assets/no-image.png';">
                <div class="card-body">
                    <h2>${item.nama}</h2>
                    <p>${item.deskripsi}</p>
                    <p><b>💸 Harga :</b> ${item.harga}</p>
                    <p><b>📍 Lokasi :</b> ${item.lokasi}</p>
                    <p><b>🏷️ Kategori :</b> ${item.kategori}</p>
                    <br>
                    <button class="detailBtn" onclick="history.back()">← Kembali</button>
                </div>
            `;
        }

        document.addEventListener("DOMContentLoaded", muatDetail);

        // Register PWA Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
