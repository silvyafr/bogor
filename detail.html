
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Kuliner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="navbar">
    <h2>Detail Kuliner Khas Bogor</h2>
    <nav>
        <a href="index.html">Home</a>
    </nav>
</header>

<main class="detail-container">

    <img id="gambar" src="" alt="" class="detail-img">

    <h1 id="nama"></h1>

    <table class="detail-table">
        <tr>
            <td><b>Kategori</b></td>
            <td id="kategori"></td>
        </tr>
        <tr>
            <td><b>Harga</b></td>
            <td id="harga"></td>
        </tr>
        <tr>
            <td><b>Lokasi</b></td>
            <td id="lokasi"></td>
        </tr>
    </table>

    <h3>Deskripsi</h3>

    <p id="deskripsi"></p>

    <br>

    <a href="index.html" class="btn-detail">← Kembali ke Home</a>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<script>
async function loadDetail() {

    const id = new URLSearchParams(window.location.search).get("id");

    const { data, error } = await db
        .from("kuliner")
        .select("*")
        .eq("id", id)
        .single();

    if (error || !data) {
        alert("Data tidak ditemukan!");
        window.location.href = "index.html";
        return;
    }

    document.getElementById("gambar").src = data.gambar;
    document.getElementById("gambar").alt = data.nama;

    document.getElementById("nama").textContent = data.nama;

    document.getElementById("kategori").textContent = data.kategori;

    document.getElementById("harga").textContent = data.harga;

    document.getElementById("lokasi").textContent = data.lokasi;

    document.getElementById("deskripsi").textContent = data.deskripsi;
}

loadDetail();
</script>
}
</script>

</body>
</html>
