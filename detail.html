<script src="data.js"></script>

<script>
const db = dataKuliner;

// Ambil ID dari URL
const id = new URLSearchParams(window.location.search).get("id");

// Gabungkan semua data
const semua = [
    ...db.makanan,
    ...db.minuman,
    ...db.oleholeh
];

// Cari data berdasarkan ID
const item = semua.find(x => x.id === id);

// Jika data tidak ditemukan
if (!item) {
    alert("Data tidak ditemukan!");
    window.location.href = "index.html";
} else {

    // Tampilkan data
    document.getElementById("gambar").src = item.gambar;
    document.getElementById("gambar").alt = item.nama;

    document.getElementById("nama").textContent = item.nama;

    document.getElementById("harga").textContent = item.harga;

    document.getElementById("kategori").textContent = item.kategori;

    document.getElementById("lokasi").textContent = item.lokasi || "-";

    document.getElementById("deskripsi").textContent = item.deskripsi;
}
</script>
