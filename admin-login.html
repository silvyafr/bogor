<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Login Admin</title>
    <link rel="stylesheet" href="style.css">

    <style>
        .login-box {
            width: 350px;
            margin: 100px auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,.15);
        }

        .login-box input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            box-sizing: border-box; /* Agar input tidak melewati batas kotak */
        }

        .login-box button {
            width: 100%;
            padding: 12px;
            border: none;
            background: #7FB77E;
            color: white;
            cursor: pointer;
            border-radius: 8px;
            margin-top: 10px;
        }

        .login-box h2 {
            text-align: center;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h2>Login Admin</h2>
    
    <!-- Menggunakan tag form agar mendukung kecocokan standar Firebase -->
    <form id="formLogin">
        <!-- Tipe input diubah ke email sesuai aturan Firebase Authentication -->
        <input type="email" id="emailInput" placeholder="Email Admin" required>
        <input type="password" id="passwordInput" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>
</div>

<!-- Seluruh skrip logika Firebase disatukan di sini -->
<script type="module">
  // Alamat CDN Firebase diperbaiki ke versi lengkap yang valid
  import { initializeApp } from "https://gstatic.com";
  import { getAuth, signInWithEmailAndPassword } from "https://gstatic.com";

  // 1. SILAKAN TEMPELKAN ISI KODE KONSOL FIREBASE ASLI ANDA DI SINI
  const firebaseConfig = {
    apiKey: "AIzaSyYOUR_ACTUAL_API_KEY", 
    authDomain: "kuliner-bogor.firebaseapp.com",
    projectId: "kuliner-bogor",
    storageBucket: "kuliner-bogor.appspot.com",
    messagingSenderId: "YOUR_SENDER_ID",
    appId: "YOUR_APP_ID"
  };

  // Inisialisasi Firebase
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // 2. Logika Fungsi Login Firebase
  const loginForm = document.querySelector('#formLogin');
  
  if (loginForm) {
    loginForm.addEventListener('submit', (e) => {
      e.preventDefault(); // Mencegah reload halaman otomatis saat klik submit
      
      const email = document.querySelector('#emailInput').value;
      const password = document.querySelector('#passwordInput').value;

      // Jalankan proses autentikasi ke server Firebase
      signInWithEmailAndPassword(auth, email, password)
        .then((userCredential) => {
          // Menyimpan penanda login aktif ke browser
          sessionStorage.setItem("login", "true");
          alert("Login Berhasil!");
          window.location.href = "admin.html"; 
        })
        .catch((error) => {
          // Memberi tahu admin jika kombinasi salah atau koneksi bermasalah
          alert("Login Gagal: Periksa kembali email dan password Anda.");
          console.error(error.message);
        });
    });
  }
</script>

</body>
</html>
