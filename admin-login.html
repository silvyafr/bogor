<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Login Admin</title>
    <link rel="stylesheet" href="style.css">

    <style>
        .login-box{
            width:350px;
            margin:100px auto;
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0 5px 20px rgba(0,0,0,.15);
        }

        .login-box input{
            width:100%;
            padding:10px;
            margin:10px 0;
        }

        .login-box button{
            width:100%;
            padding:12px;
            border:none;
            background:#7FB77E;
            color:white;
            cursor:pointer;
            border-radius:8px;
        }

        .login-box h2{
            text-align:center;
            margin-bottom:20px;
        }
    </style>

</head>
<body>

<div class="login-box">

<h2>Login Admin</h2>

<input
type="text"
id="username"
placeholder="Username">

<input
type="password"
id="password"
placeholder="Password">

<button onclick="login()">
Login
</button>

</div>

<script>

function login(){

const username=document.getElementById("username").value;

const password=document.getElementById("password").value;

if(username=="admin" && password=="admin123"){

sessionStorage.setItem("login","true");

location.href="admin.html";

}else{

alert("Username atau Password salah!");

}

}

</script>

<!-- Load Firebase SDK Modul -->
<script type="module">
  import { initializeApp } from "https://gstatic.com";
  import { getAuth, signInWithEmailAndPassword } from "https://gstatic.com";

  // 1. Tempel isi FirebaseConfig dari Langkah 2 sebelumnya di sini
  const firebaseConfig = {
    apiKey: "AIzaSy...",
    authDomain: "://firebaseapp.com",
    projectId: "kuliner-bogor",
    storageBucket: "://appspot.com",
    messagingSenderId: "1234567890",
    appId: "1:1234:web:abcd"
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // 2. Logika Fungsi Login saat Tombol di Form di-klik
  const loginForm = document.querySelector('#formLogin'); // Sesuaikan ID form HTML Anda
  
  if (loginForm) {
    loginForm.addEventListener('submit', (e) => {
      e.preventDefault();
      
      // Ambil input email dan password dari form HTML Anda
      const email = document.querySelector('#emailInput').value; // Sesuaikan ID input email
      const password = document.querySelector('#passwordInput').value; // Sesuaikan ID input password

      // Proses Autentikasi Ke Firebase
      signInWithEmailAndPassword(auth, email, password)
        .then((userCredential) => {
          // Jika login sukses, arahkan admin ke halaman dashboard admin.html
          alert("Login Berhasil!");
          window.location.href = "admin.html"; 
        })
        .catch((error) => {
          // Jika login gagal (salah password/email)
          alert("Login Gagal: " + error.message);
        });
    });
  }
</script>

</body>
</html>
