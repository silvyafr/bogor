<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Admin</title>

<style>

body{
    margin:0;
    background:#f5f7fb;
    font-family:'Montserrat',sans-serif;
}

.header{
    background:#7FB77E;
    color:white;
    padding:20px 30px;
    border-bottom-left-radius:15px;
    border-bottom-right-radius:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.container{
    width:95%;
    max-width:1400px;
    margin:25px auto;
}

.cardBox{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:20px;
}

.card{
    background:white;
    border-radius:15px;
    padding:20px;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
    text-align:center;
}

.card h2{
    color:#7FB77E;
    font-size:32px;
    margin:15px 0 0;
}

.toolbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:15px;
    margin:20px 0;
}

.toolbar input{
    flex:1;
    height:45px;
    padding:0 15px;
    border:1px solid #ddd;
    border-radius:10px;
    font-size:15px;
}

button{
    border:none;
    padding:12px 18px;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

.btnTambah{
    background:#7FB77E;
    color:white;
}

.btnEdit{
    background:#3498db;
    color:white;
    margin-bottom:5px;
}

.btnHapus{
    background:#e74c3c;
    color:white;
}

.btnLogout{
    background:#555;
    color:white;
}

.table-responsive{
    width:100%;
    overflow-x:auto;
}

table{
    width:100%;
    min-width:900px;
    border-collapse:collapse;
    background:white;
    border-radius:15px;
    overflow:hidden;
}

th{
    background:#7FB77E;
    color:white;
    padding:15px;
    white-space:nowrap;
}

td{
    padding:15px;
    border-bottom:1px solid #eee;
    vertical-align:top;
}

.thumb{
    width:120px;
    height:80px;
    object-fit:cover;
    border-radius:10px;
}

@media(max-width:768px){

.header{
    flex-direction:column;
    gap:15px;
    text-align:center;
    padding:20px;
}

.header h1{
    margin:0;
    font-size:28px;
}

.cardBox{
    grid-template-columns:repeat(2,1fr);
}

.card{
    padding:15px;
}

.card h2{
    font-size:24px;
}

.toolbar{
    flex-direction:column;
}

.toolbar input{
    width:100%;
}

.btnTambah{
    width:100%;
}

.btnEdit,
.btnHapus{
    width:100%;
    margin-bottom:6px;
}

    .header{
        flex-direction:column;
        text-align:center;
        gap:15px;
        padding:25px 15px;
    }

    .toolbar{
        flex-direction:column;
        gap:15px;
    }

    .toolbar input{
        width:100%;
    }

    .toolbar button{
        width:100%;
    }

    .container{
        width:95%;
    }

    .cardBox{
        grid-template-columns:repeat(2,1fr);
    }

}

</style>

</head>

<body>

<div class="header">

<div>
<h1>Dashboard Admin</h1>
<p>Kelola seluruh data kuliner khas Bogor</p>
</div>

<button class="btnLogout" onclick="logout()">
Logout
</button>

</div>

<div class="container">

<div class="cardBox">

<div class="card">
🍽️
<h4>Total Makanan</h4>
<h2 id="totalMakanan">0</h2>
</div>

<div class="card">
🥟
<h4>Total Jajanan</h4>
<h2 id="totalJajanan">0</h2>
</div>

<div class="card">
🧋
<h4>Total Minuman</h4>
<h2 id="totalMinuman">0</h2>
</div>

<div class="card">
🎁
<h4>Total Oleh-oleh</h4>
<h2 id="totalOlehOleh">0</h2>
</div>

<div class="card">
📦
<h4>Total Data</h4>
<h2 id="totalData">0</h2>
</div>

</div>

<div class="toolbar">

<input
type="text"
id="search"
placeholder="Cari kuliner..."
onkeyup="cariData()">

<button
class="btnTambah"
onclick="location.href='tambah.html'">

+ Tambah Data

</button>

</div>

<div class="table-responsive">

<table>

<thead>

<tr>
<th>No</th>
<th>Gambar</th>
<th>Nama</th>
<th>Kategori</th>
<th>Harga</th>
<th>Deskripsi</th>
<th>Aksi</th>
</tr>

</thead>

<tbody id="tabelData"></tbody>

</table>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<script>

if (!sessionStorage.getItem("login")) {
    location.href = "admin-login.html";
}

function logout() {
    sessionStorage.clear();
    location.href = "admin-login.html";
}

async function tampilData(keyword = "") {

    const { data, error } = await db
        .from("kuliner")
        .select("*")
        .order("nama", { ascending: true });

    if (error) {
        console.log(error);
        return;
    }

    let semua = data;

    if (keyword.trim() !== "") {
        semua = semua.filter(item =>
            item.nama &&
            item.nama.toLowerCase().includes(keyword.toLowerCase())
        );
    }

    // Total Card
    const totalMakanan = document.getElementById("totalMakanan");
    const totalJajanan = document.getElementById("totalJajanan");
    const totalMinuman = document.getElementById("totalMinuman");
    const totalOlehOleh = document.getElementById("totalOlehOleh");
    const totalData = document.getElementById("totalData");
        
    if (totalMakanan)
        totalMakanan.innerText =
            data.filter(item => item.jenis === "makanan").length;
    
    if (totalJajanan)
        totalJajanan.innerText =
            data.filter(item => item.jenis === "jajanan").length;
    
    if (totalMinuman)
        totalMinuman.innerText =
            data.filter(item => item.jenis === "minuman").length;
    
    if (totalOlehOleh)
        totalOlehOleh.innerText =
            data.filter(item => item.jenis === "oleh-oleh").length;
    
    if (totalData)
        totalData.innerText = data.length;

    // Tabel
    let html = "";

    semua.forEach((item, index) => {

        html += `
            <tr>
            
            <td style="width:50px">${index+1}</td>
                  
            <td style="width:120px">
                  <img class="thumb"
                        src="${item.gambar}"
                        onerror="this.src='assets/no-image.png'">
        </td>
        
        <td style="width:170px">${item.nama}</td>
        
        <td style="width:120px">${item.kategori}</td>
        
        <td style="width:150px">${item.harga}</td>
        
        <td style="width:320px">
            ${
                item.deskripsi.length > 70
                ? item.deskripsi.substring(0,70) + "..."
                : item.deskripsi
            }
        </td>
        
        <td style="width:110px">
            <button class="btnEdit"
                onclick="location.href='edit.html?id=${item.id}'">
                Edit
            </button>
        
            <button class="btnHapus"
                onclick="hapusData('${item.id}')">
                Hapus
            </button>
        </td>
        
        </tr>
        `;
    });

    const tabel = document.getElementById("tabelData");

    if (tabel) {
        tabel.innerHTML = html;
    }

}

function cariData() {

    tampilData(
        document.getElementById("search").value
    );

}

async function hapusData(id) {

    if (!confirm("Yakin ingin menghapus data?")) return;

    const { data: hasil, error } = await db
        .from("kuliner")
        .delete()
        .eq("id", id)
        .select();

    console.log("ID:", id);
    console.log("Hasil:", hasil);
    console.log("Error:", error);

    if (error) {
        alert("Gagal menghapus data");
        console.log(error);
        return;
    }

    alert("Data berhasil dihapus");

    tampilData();

}

document.addEventListener("DOMContentLoaded", function () {
    tampilData();
});

</script>
    
</body>
</html>
