<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Admin</title>

<link rel="stylesheet" href="style.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#f4f6f9;
}

.header{
background:#7FB77E;
color:white;
padding:18px 40px;
display:flex;
justify-content:space-between;
align-items:center;
}

.header h2{
font-size:24px;
}

.header button{
background:white;
color:#7FB77E;
border:none;
padding:10px 18px;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.container{
max-width:1200px;
margin:auto;
padding:30px;
}

.cards{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-bottom:30px;
}

.card{
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.card h3{
color:#777;
font-size:15px;
margin-bottom:10px;
}

.card h1{
color:#7FB77E;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
gap:20px;
}

.search{
flex:1;
}

.search input{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #ccc;
}

.tambah{
background:#7FB77E;
color:white;
padding:12px 18px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

table{
width:100%;
border-collapse:collapse;
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,.08);
}

th{
background:#7FB77E;
color:white;
padding:15px;
}

td{
padding:15px;
border-bottom:1px solid #eee;
}

.edit{
background:#3498db;
color:white;
border:none;
padding:8px 15px;
border-radius:6px;
cursor:pointer;
margin-right:5px;
}

.hapus{
background:#e74c3c;
color:white;
border:none;
padding:8px 15px;
border-radius:6px;
cursor:pointer;
}

@media(max-width:768px){

.cards{
grid-template-columns:1fr;
}

.topbar{
flex-direction:column;
align-items:stretch;
}

}

</style>

</head>

<body>

<div class="header">

<h2>Dashboard Admin</h2>

<button onclick="logout()">
Logout
</button>

</div>

<div class="container">

<div class="cards">

<div class="card">
<h3>Total Makanan</h3>
<h1 id="totalMakanan">0</h1>
</div>

<div class="card">
<h3>Total Minuman</h3>
<h1 id="totalMinuman">0</h1>
</div>

<div class="card">
<h3>Total Data</h3>
<h1 id="totalData">0</h1>
</div>

</div>

<div class="topbar">

<div class="search">

<input
type="text"
id="search"
placeholder="Cari kuliner..."
onkeyup="cariData()">

</div>

<button
class="tambah"
onclick="location.href='tambah.html'">

+ Tambah Data

</button>

</div>

<table>

<thead>

<tr>

<th>No</th>

<th>Nama</th>

<th>Kategori</th>

<th>Harga</th>

<th>Aksi</th>

</tr>

</thead>

<tbody id="tabelData">

</tbody>

</table>

</div>

<script src="data.js"></script>

<script>

if(!sessionStorage.getItem("login")){
    location.href="admin-login.html";
}

const db = JSON.parse(localStorage.getItem("dataKuliner"));

function logout(){
    sessionStorage.clear();
    location.href="admin-login.html";
}

function tampilData(keyword=""){

    let semua=[
        ...db.makanan,
        ...db.minuman
    ];

    if(keyword!=""){
        semua=semua.filter(item=>
            item.nama.toLowerCase().includes(keyword.toLowerCase())
        );
    }

    document.getElementById("totalMakanan").innerText=db.makanan.length;
    document.getElementById("totalMinuman").innerText=db.minuman.length;
    document.getElementById("totalData").innerText=
        db.makanan.length+db.minuman.length;

    let html="";

    semua.forEach((item,index)=>{

        html+=`
        <tr>

        <td>${index+1}</td>

        <td>${item.nama}</td>

        <td>${item.kategori}</td>

        <td>${item.harga}</td>

        <td>

        <button
        class="edit"
        onclick="location.href='edit.html?id=${item.id}'">
        
        Edit
        
        </button>

        <button
        class="hapus"
        onclick="hapusData('${item.id}')">

        Hapus

        </button>

        </td>

        </tr>
        `;

    });

    document.getElementById("tabelData").innerHTML=html;

}

function cariData(){

    tampilData(
        document.getElementById("search").value
    );

}

function hapusData(id){

    if(!confirm("Yakin ingin menghapus data ini?")) return;

    db.makanan=db.makanan.filter(item=>item.id!==id);
    db.minuman=db.minuman.filter(item=>item.id!==id);

    localStorage.setItem(
        "dataKuliner",
        JSON.stringify(db)
    );

    tampilData();

}

tampilData();

</script>

</body>
</html>
