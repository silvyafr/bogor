<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<script>

if(!sessionStorage.getItem("login")){
    location.href="admin-login.html";
}

function logout(){
    sessionStorage.clear();
    location.href="admin-login.html";
}

async function tampilData(keyword=""){

    const { data, error } = await db
    .from("kuliner")
    .select("*")
    .order("nama");

    if(error){
        console.log(error);
        return;
    }

    let semua = data;

    if(keyword!=""){
        semua = semua.filter(item =>
            item.nama.toLowerCase().includes(keyword.toLowerCase())
        );
    }

    document.getElementById("totalMakanan").innerText =
        data.filter(item => item.jenis=="makanan").length;

    document.getElementById("totalMinuman").innerText =
        data.filter(item => item.jenis=="minuman").length;

    document.getElementById("totalData").innerText =
        data.length;

    let html="";

    semua.forEach((item,index)=>{

        html += `
        <tr>

            <td>${index+1}</td>

            <td>
                <img
                    class="thumb"
                    src="${item.gambar}"
                    onerror="this.src='assets/no-image.png'">
            </td>

            <td>${item.nama}</td>

            <td>${item.kategori}</td>

            <td>${item.harga}</td>

            <td>

                <button
                    class="btnEdit"
                    onclick="location.href='edit.html?id=${item.id}'">

                    Edit

                </button>

                <button
                    class="btnHapus"
                    onclick="hapusData('${item.id}')">

                    Hapus

                </button>

            </td>

        </tr>
        `;

    });

    document.getElementById("tabelData").innerHTML = html;

}

function cariData(){

    tampilData(
        document.getElementById("search").value
    );

}

async function hapusData(id){

    const konfirmasi = confirm("Yakin ingin menghapus data?");

    if(!konfirmasi) return;

    const { error } = await db
    .from("kuliner")
    .delete()
    .eq("id", id);

    if(error){

        alert("Gagal menghapus data");
        console.log(error);
        return;

    }

    alert("Data berhasil dihapus");

    tampilData();

}

tampilData();

</script>
