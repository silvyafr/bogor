<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Admin</title>

<style>

body{
    margin:0;
    background:#f5f7fb;
    font-family:'Montserrat', sans-serif;
}

.header{
    background:#7FB77E;
    color:white;
    padding:30px 20px;
    border-bottom-left-radius:12px;
    border-bottom-right-radius:12px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.container{
    width:95%;
    max-width:1500px;
    margin:20px auto;
}

.cardBox{
    display:flex;
    gap:15px;
    margin-bottom:10px;
}

.card{
    background:white;
    flex:0 0 100px;
    border-radius:15px;
    padding:25px;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
    text-align:center;
}

.card h2{
    color:#7FB77E;
    font-size:30px;
    margin-top:20px;
}

.toolbar{
    display:flex;
    justify-content:space-between;
    margin:25px 0;
}

input[type=text]{
    width:320px;
    height:45px;
    padding:0 15px;
    border:1px solid #ddd;
    border-radius:10px;
}

button{
    border:none;
    padding:12px 18px;
    border-radius:8px;
    cursor:pointer;
}

.btnTambah{
    background:#7FB77E;
    color:white;
}

.btnEdit{
    background:#3498db;
    color:white;
}

.btnHapus{
    background:#e74c3c;
    color:white;
}

.btnLogout{
    background:#555;
    color:white;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
    border-radius:15px;
    overflow:hidden;
}

th{
    background:#7FB77E;
    color:white;
    padding:15px;
}

td{
    padding:15px;
    border-bottom:1px solid #eee;
}

.thumb{
    width:120px;
    height:80px;
    object-fit:cover;
    border-radius:10px;
}

</style>

</head>

<body>

<div class="header">

<h1>Dashboard Admin</h1>

<button class="btnLogout" onclick="logout()">
Logout
</button>

</div>

<div class="container">

<div class="cardBox">

<div class="card">
🍽️
<h4>Total Makanan</h4>
<h2 id="totalMakanan">0</h2>
</div>

<div class="card">
🥟
<h4>Total Jajanan</h4>
<h2 id="totalJajanan">0</h2>
</div>

<div class="card">
🧋
<h4>Total Minuman</h4>
<h2 id="totalMinuman">0</h2>
</div>

<div class="card">
🎁
<h4>Total Oleh-oleh</h4>
<h2 id="totalOleh-oleh">0</h2>
</div>

<div class="card">
📦
<h4>Total Data</h4>
<h2 id="totalData">0</h2>
</div>

</div>

<div class="toolbar">

<input
type="text"
id="search"
placeholder="Cari kuliner..."
onkeyup="cariData()">

<button
class="btnTambah"
onclick="location.href='tambah.html'">

+ Tambah Data

</button>

</div>

<table>

<thead>

<tr>

<th>No</th>
<th>Gambar</th>
<th>Nama</th>
<th>Kategori</th>
<th>Harga</th>
<th>Deskripsi</th>
<th>Aksi</th>

</tr>

</thead>

<tbody id="tabelData">

</tbody>

</table>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<script>

if (!sessionStorage.getItem("login")) {
    location.href = "admin-login.html";
}

function logout() {
    sessionStorage.clear();
    location.href = "admin-login.html";
}

async function tampilData(keyword = "") {

    const { data, error } = await db
        .from("kuliner")
        .select("*")
        .order("nama", { ascending: true });

    if (error) {
        console.log(error);
        return;
    }

    let semua = data;

    if (keyword.trim() !== "") {
        semua = semua.filter(item =>
            item.nama &&
            item.nama.toLowerCase().includes(keyword.toLowerCase())
        );
    }

    // Total Card
    const totalMakanan = document.getElementById("totalMakanan");
    const totalJajanan = document.getElementById("totalJajanan");
    const totalMinuman = document.getElementById("totalMinuman");
    const totalOleh-oleh = document.getElementById("totalOleh-oleh")
    const totalData = document.getElementById("totalData");

    if (totalMakanan)
        totalMakanan.innerText =
            data.filter(item => item.jenis === "makanan").length;
    
    if (totalJajanan)
        totalJajanan.innerText =
            data.filter(item => item.jenis === "jajanan").length;
    
    if (totalMinuman)
        totalMinuman.innerText =
            data.filter(item => item.jenis === "minuman").length;

    if (totalOleh-oleh)
        totalOleh-oleh.innerText =
            data.filter(item => item.jenis === "Oleh-oleh").length;

    if (totalData)
        totalData.innerText = data.length;

    // Tabel
    let html = "";

    semua.forEach((item, index) => {

        html += `
        <tr>
            <td>${index + 1}</td>

            <td>
                <img
                    class="thumb"
                    src="${item.gambar}"
                    onerror="this.src='assets/no-image.png'">
            </td>

            <td>${item.nama}</td>

            <td>${item.kategori}</td>

            <td>${item.harga}</td>

            <td>${item.deskripsi}</td>

            <td>
                <button
                    class="btnEdit"
                    onclick="location.href='edit.html?id=${item.id}'">
                    Edit
                </button>

                <button
                    class="btnHapus"
                    onclick="hapusData('${item.id}')">
                    Hapus
                </button>
            </td>
        </tr>
        `;

    });

    const tabel = document.getElementById("tabelData");

    if (tabel) {
        tabel.innerHTML = html;
    }

}

function cariData() {

    tampilData(
        document.getElementById("search").value
    );

}

async function hapusData(id) {

    if (!confirm("Yakin ingin menghapus data?")) return;

    const { data: hasil, error } = await db
        .from("kuliner")
        .delete()
        .eq("id", id)
        .select();

    console.log("ID:", id);
    console.log("Hasil:", hasil);
    console.log("Error:", error);

    if (error) {
        alert("Gagal menghapus data");
        console.log(error);
        return;
    }

    alert("Data berhasil dihapus");

    tampilData();

}

document.addEventListener("DOMContentLoaded", function () {
    tampilData();
});

</script>
    
</body>
</html>
