<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Admin</title>

<!-- <link rel="stylesheet" href="style.css"> -->

<style>

body{
    margin:0;
    background:#f5f7fb;
    font-family:Arial,Helvetica,sans-serif;
}

.header{
    background:#7FB77E;
    color:white;
    padding:25px 50px;
    border-bottom-left-radius:20px;
    border-bottom-right-radius:20px;

    display:flex;
    justify-content:space-between;
    align-items:center;
}

.container{
    width:95%;
    max-width:1500px;
    margin:40px auto;
}

.cardBox{
    display:flex;
    gap:25px;
    margin-bottom:30px;
}

.card{
    background:white;
    flex:0 0 250px;
    border-radius:15px;
    padding:25px;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
    text-align:center;
    transition:.25s;
}

.card h2{
    margin:0;
    color:#7FB77E;
    font-size:40px;
}

.toolbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin:25px 0;
}

.toolbar button{
    margin-left:15px;
}

input[type=text]{
    width:320px;
    height:45px;
    padding:0 15px;
    border:1px solid #ddd;
    border-radius:10px;
}

button{
    border:none;
    padding:12px 18px;
    border-radius:8px;
    cursor:pointer;
}

.btnTambah{
    background:#7FB77E;
    color:white;
    padding:12px 25px;
}

.btnEdit{
    background:#3498db;
    color:white;
    margin-right:5px;
    width:75px;
}

.btnHapus{
    background:#e74c3c;
    color:white;
    margin-right:5px;
    width:75px;
}

table{
    width:100%;
    background:white;
    border-collapse:collapse;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
}

th{
    background:#7FB77E;
    color:#fff;
    font-size:17px;
    text-align:center;
    padding:15px;
}

td{
    padding:15px;
    text-align:left;
    border-bottom:1px solid #eee;
    vertical-align:middle;
}

img.thumb{
    width:120px;
    height:80px;
    object-fit:cover;
    border-radius:10px;
}

.btnLogout{
background:#555;
color:white;
}

.card h4{
    margin-top:10px;
    color:#777;
}

.card h2{
    margin-top:10px;
}

.card:hover{
    transform:translateY(-5px);
}

button{
    transition:.2s;
}

button:hover{
    opacity:.9;
}

tr:hover{
    background:#f8f8f8;
}
    
</style>

</head>

<body>

<div class="header">

<h1>Dashboard Admin</h1>

<button class="btnLogout" onclick="logout()">
Logout
</button>

</div>

<div class="container">

<div class="cardBox">

<div class="card">
🍽️
<h4>Total Makanan</h4>
<h2 id="totalMakanan"></h2>
</div>

<div class="card">
🧋
<h4>Total Minuman</h4>
<h2 id="totalMinuman"></h2>
</div>

<div class="card">
📦
<h4>Total Data</h4>
<h2 id="totalData"></h2>
</div>

</div>

<div class="toolbar">

<input
type="text"
placeholder="Cari kuliner..."
id="search"
onkeyup="cariData()">

<button
class="btnTambah"
onclick="location.href='tambah.html'">

+ Tambah Data

</button>

</div>

<table>

<thead>

<tr>

<th>No</th>

<th>Gambar</th>

<th>Nama</th>

<th>Kategori</th>

<th>Harga</th>

<th>Aksi</th>

</tr>

</thead>

<tbody id="tabelData">

</tbody>

</table>

</div>
    
<script src="data.js"></script>

<script>

if(!sessionStorage.getItem("login")){
    location.href="admin-login.html";
}

const db =
JSON.parse(localStorage.getItem("dataKuliner"))
||
dataKuliner;

function logout(){
    sessionStorage.clear();
    location.href="admin-login.html";
}

function tampilData(keyword=""){

    let semua = [
        ...(db.makanan || []),
        ...(db.minuman || [])
    ];

    if(keyword!=""){
        semua=semua.filter(item=>
            (item.nama || "")
            .toLowerCase()
            .includes(keyword.toLowerCase())
        );
    }

    document.getElementById("totalMakanan").innerText =
    (db.makanan || []).length;
    
    document.getElementById("totalMinuman").innerText =
    (db.minuman || []).length;
    
    document.getElementById("totalData").innerText =
    (db.makanan || []).length +
    (db.minuman || []).length;

    let html="";

    semua.forEach((item,index)=>{

    html += `
    <tr>
    
    <td>${index+1}</td>
    
    <td>
    <img
    class="thumb"
    src="${item.gambar}"
    onerror="this.src='assets/no-image.png'">
    </td>
    
    <td>${item.nama}</td>
    
    <td>${item.kategori}</td>
    
    <td>Rp${Number(item.harga || 0).toLocaleString("id-ID")}</td>
    
    <td>
    
    <button
    class="btnEdit"
    onclick="location.href='edit.html?id=${item.id}'">
    
    Edit
    
    </button>
    
    <button
    class="btnHapus"
    onclick="hapusData('${item.id}')">
    
    Hapus
    
    </button>
    
    </td>
    
    </tr>
    `;
});
    document.getElementById("tabelData").innerHTML=html;

}

function cariData(){

    tampilData(
        document.getElementById("search").value
    );

}

function hapusData(id){

    if(!confirm("Yakin ingin menghapus data ini?")) return;

    db.makanan = (db.makanan || []).filter(item => item.id !== id);
    db.minuman = (db.minuman || []).filter(item => item.id !== id);

    localStorage.setItem(
        "dataKuliner",
        JSON.stringify(db)
    );

    tampilData();

}

tampilData();

</script>

</body>
</html>
