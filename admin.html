<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<title>Dashboard Admin</title>

<link rel="stylesheet" href="style.css">

<style>

.dashboard{

max-width:1200px;

margin:40px auto;

}

.top{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:30px;

}

button{

padding:10px 20px;

border:none;

background:#7FB77E;

color:white;

border-radius:8px;

cursor:pointer;

}

table{

width:100%;

border-collapse:collapse;

background:white;

}

th,td{

padding:15px;

border:1px solid #ddd;

text-align:left;

}

th{

background:#7FB77E;

color:white;

}

</style>

</head>

<body>

<div class="dashboard">

<div class="top">
    <h1>Dashboard Admin</h1>

    <div>
        <button onclick="tambahData()">
            + Tambah
        </button>

        <button onclick="logout()">
            Logout
        </button>
    </div>
</div>

<table>

<thead>

<tr>

<th>No</th>

<th>Nama</th>

<th>Kategori</th>

<th>Harga</th>

<th>Aksi</th>

</tr>

</thead>

<tbody id="tabelData">

</tbody>

</table>

</div>

    
<script src="data.js"></script>

<script>

console.log("Script jalan");

if(!sessionStorage.getItem("login")){
    location.href="admin-login.html";
}

function logout(){
    sessionStorage.clear();
    location.href="admin-login.html";
}

const db = JSON.parse(localStorage.getItem("dataKuliner"));

console.log(db);

if (db) {

    let semua = [
    ...db.makanan,
    ...db.minuman
];

    console.log(semua);

    let html = "";

    semua.forEach((item, index) => {

        html += `
        <tr>
            <td>${index + 1}</td>
            <td>${item.nama}</td>
            <td>${item.kategori}</td>
            <td>${item.harga}</td>
            <td>
                <button onclick="editData('${item.id}')">
                Edit
                </button>
                <button onclick="hapusData('${item.id}')">
                Hapus
                </button>
            </td>
        </tr>
        `;

    });

    document.getElementById("tabelData").innerHTML = html;

} else {

    alert("Database kosong");

}

function hapusData(id){

    if(!confirm("Hapus data ini?")) return;

    db.makanan = db.makanan.filter(item => item.id !== id);
    db.minuman = db.minuman.filter(item => item.id !== id);

    localStorage.setItem(
        "dataKuliner",
        JSON.stringify(db)
    );

    location.reload();
}

function editData(id){

    let item = db.makanan.find(x => x.id === id);

    if(!item){
        item = db.minuman.find(x => x.id === id);
    }

    if(!item) return;

    let nama = prompt("Nama", item.nama);

    if(nama===null) return;

    let harga = prompt("Harga", item.harga);

    if(harga===null) return;

    let kategori = prompt("Kategori", item.kategori);

    if(kategori===null) return;

    item.nama = nama;
    item.harga = harga;
    item.kategori = kategori;

    localStorage.setItem(
        "dataKuliner",
        JSON.stringify(db)
    );

    location.reload();

}
    
function tambahData(){

    let nama=prompt("Nama");

    if(!nama)return;

    let harga=prompt("Harga");

    let kategori=prompt("Kategori");

    let jenis = prompt("Jenis (makanan/minuman)");

    if(!jenis) return;
    
    jenis = jenis.toLowerCase();
    
    if(jenis !== "makanan" && jenis !== "minuman"){
        alert("Jenis harus makanan atau minuman");
        return;
    }

    let dataBaru = {
        id: Date.now().toString(),
        nama: nama,
        harga: harga,
        kategori: kategori,
        lokasi: "",
        deskripsi: "",
        gambar: "assets/asinanbogor.jpg"
    };

    if(jenis==="minuman"){

        db.minuman.push(dataBaru);

    }else{

        db.makanan.push(dataBaru);

    }

    localStorage.setItem(
        "dataKuliner",
        JSON.stringify(db)
    );

    location.reload();

}

</script>
    
</body>
</html>
