<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Edit Data</title>

<style>

body{
font-family:Arial,Helvetica,sans-serif;
background:#f4f6f9;
}

.container{
max-width:700px;
margin:40px auto;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.08);
}

h2{
margin-bottom:20px;
color:#7FB77E;
}

.form-group{
margin-bottom:18px;
}

label{
display:block;
margin-bottom:8px;
font-weight:bold;
}

input,
textarea,
select{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:8px;
}

textarea{
height:100px;
resize:vertical;
}

.button-group{
display:flex;
gap:10px;
margin-top:20px;
}

button{
padding:12px 20px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.update{
background:#7FB77E;
color:white;
}

.kembali{
background:#999;
color:white;
}

</style>

</head>

<body>

<div class="container">

<h2>Edit Data Kuliner</h2>

<div class="form-group">
<label>Nama</label>
<input type="text" id="nama">
</div>

<div class="form-group">
<label>Harga</label>
<input type="text" id="harga">
</div>

<div class="form-group">
<label>Kategori</label>

<select id="kategori">
<option value="🔥 Viral">🔥 Viral</option>
<option value="⭐ Rekomendasi">⭐ Rekomendasi</option>
</select>

</div>

<div class="form-group">
<label>Jenis</label>

<select id="jenis">
<option value="makanan">Makanan</option>
<option value="minuman">Minuman</option>
<option value="jajanan">Jajanan</option>
<option value="oleh-oleh">Oleh-Oleh</option>
</select>

</div>

<div class="form-group">
<label>Lokasi</label>
<input type="text" id="lokasi">
</div>

<div class="form-group">
<label>Deskripsi</label>
<textarea id="deskripsi"></textarea>
</div>

<div class="form-group">

<label>Upload Gambar</label>

<input
type="file"
id="gambar"
accept="image/*">

<br><br>

<img
id="preview"
style="max-width:220px;border-radius:10px;display:block;">

</div>

<div class="button-group">

<button
class="update"
onclick="updateData()">

Update

</button>

<button
class="kembali"
onclick="location.href='admin.html'">

Kembali

</button>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<script>

if(!sessionStorage.getItem("login")){
location.href="admin-login.html";
}

const id = new URLSearchParams(location.search).get("id");

async function loadData(){

console.log("ID dari URL =", id);

const { data, error } = await db
.from("kuliner")
.select("*")
.eq("id", id)
.single();

console.log("DATA =", data);
console.log("ERROR =", error);

if(error){
alert("Data tidak ditemukan");
return;
}

document.getElementById("nama").value = data.nama;
document.getElementById("harga").value = data.harga;
document.getElementById("kategori").value = data.kategori;
document.getElementById("jenis").value = data.jenis;
document.getElementById("lokasi").value = data.lokasi;
document.getElementById("deskripsi").value = data.deskripsi;

// hilangkan assets/
document.getElementById("gambar").value =
    data.gambar.replace("assets/","");

}

let gambarLama = "";

function readFileAsBase64(file){

    return new Promise((resolve,reject)=>{

        const reader = new FileReader();

        reader.onload = ()=>resolve(reader.result);

        reader.onerror = reject;

        reader.readAsDataURL(file);

    });

}
    
loadData();

async function updateData(){

const nama = document.getElementById("nama").value.trim();
const harga = document.getElementById("harga").value.trim();
const kategori = document.getElementById("kategori").value;
const jenis = document.getElementById("jenis").value;
const lokasi = document.getElementById("lokasi").value.trim();
const deskripsi = document.getElementById("deskripsi").value.trim();

let gambar = gambarLama;

const file = document.getElementById("gambar").files[0];

if(file){
    gambar = await readFileAsBase64(file);
}

const { error } = await db
.from("kuliner")
.update({

    nama,
    harga,
    kategori,
    jenis,
    lokasi,
    deskripsi,
    gambar

})
.eq("id", id);

if(error){
    console.log(error);
    alert(error.message);
    return;
}

alert("Data berhasil diperbarui");

location.href="admin.html";

}
    
</script>

</body>
</html>
