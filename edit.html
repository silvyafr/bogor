<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Edit Data</title>

<!--
<link rel="stylesheet" href="style.css">
-->

<style>

body{
font-family:Arial,Helvetica,sans-serif;
background:#f4f6f9;
}

.container{
max-width:700px;
margin:40px auto;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.08);
}

h2{
margin-bottom:20px;
color:#7FB77E;
}

.form-group{
margin-bottom:18px;
}

label{
display:block;
margin-bottom:8px;
font-weight:bold;
}

input,
textarea,
select{

width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:8px;

}

textarea{

height:100px;
resize:vertical;

}

.button-group{

display:flex;
gap:10px;
margin-top:20px;

}

button{

padding:12px 20px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;

}

.update{

background:#7FB77E;
color:white;

}

.kembali{

background:#999;
color:white;

}

</style>

</head>

<body>

<div class="container">

<h2>Edit Data Kuliner</h2>

<div class="form-group">
<label>Nama</label>
<input id="nama">
</div>

<div class="form-group">
<label>Harga</label>
<input id="harga">
</div>

<div class="form-group">
<label>Kategori</label>

<select id="kategori">

<option value="viral">Viral</option>

<option value="rekomendasi">Rekomendasi</option>

</select>

</div>

<div class="form-group">
<label>Lokasi</label>
<input id="lokasi">
</div>

<div class="form-group">
<label>Deskripsi</label>
<textarea id="deskripsi"></textarea>
</div>

<div class="form-group">
<label>Nama File Gambar</label>
<input
id="gambar"
placeholder="contoh: asinanbogor.jpg">
</div>

<div class="button-group">

<button
class="update"
onclick="updateData()">

Update

</button>

<button
class="kembali"
onclick="location.href='admin.html'">

Kembali

</button>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<script>

if(!sessionStorage.getItem("login")){

location.href="admin-login.html";

}

const id=
new URLSearchParams(location.search).get("id");

const id = new URLSearchParams(location.search).get("id");

let item;

async function loadData(){

    const { data, error } = await db
        .from("kuliner")
        .select("*")
        .eq("id", id)
        .single();

    if(error){
        alert("Data tidak ditemukan");
        location.href="admin.html";
        return;
    }

    item = data;

    document.getElementById("nama").value = item.nama;
    document.getElementById("harga").value = item.harga;
    document.getElementById("kategori").value = item.kategori;
    document.getElementById("lokasi").value = item.lokasi;
    document.getElementById("deskripsi").value = item.deskripsi;
    document.getElementById("gambar").value = item.gambar;

}

loadData();

document.getElementById("nama").value=item.nama;
document.getElementById("harga").value =
String(item.harga).replace(/[^\d]/g,"");
document.getElementById("kategori").value=item.kategori;
document.getElementById("lokasi").value=item.lokasi;
document.getElementById("deskripsi").value=item.deskripsi;

document.getElementById("gambar").value=
item.gambar.replace("assets/","");

async function updateData(){

    const { error } = await db
        .from("kuliner")
        .update({

            nama: document.getElementById("nama").value,

            harga: document.getElementById("harga").value,

            kategori: document.getElementById("kategori").value,

            lokasi: document.getElementById("lokasi").value,

            deskripsi: document.getElementById("deskripsi").value,

            gambar: document.getElementById("gambar").value

        })
        .eq("id", id);

    if(error){
        alert(error.message);
        return;
    }

    alert("Data berhasil diupdate");

    location.href="admin.html";

}
  
item.nama=
document.getElementById("nama").value;

item.harga =
Number(
document.getElementById("harga").value.replace(/\D/g,"")
);

item.kategori=
document.getElementById("kategori").value;

item.lokasi=
document.getElementById("lokasi").value;

item.deskripsi=
document.getElementById("deskripsi").value;

item.gambar=
"assets/"+document.getElementById("gambar").value;

localStorage.setItem(

"dataKuliner",

JSON.stringify(db)

);

alert("Data berhasil diperbarui");

location.href="admin.html";

}

</script>

</body>
</html>
